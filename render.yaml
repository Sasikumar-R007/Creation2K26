services:
  - type: web
    name: creation2k26
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /

databases:
  - name: creation2k26-db
    plan: free
    databaseName: creation2k26
    user: creation2k26

